  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    const page = document.getElementById(`page-${pageId}`);
    if(page) page.classList.add('active');
    
    const nav = document.getElementById(`nav-${pageId}`);
    if(nav) nav.classList.add('active');

    if(pageId === 'home') renderHome();
    if(pageId === 'community') loadCommunityData();
    if(pageId === 'watchlist') renderWatchlist();
    if(pageId === 'game') renderGame();
    if(pageId === 'mbti') startMBTI();
  }

    getClaudeAnalysis(pick);

  // 백엔드 연동: 커뮤니티 언급량 및 분석 가져오기
  async function getClaudeAnalysis(pick) {
    const container = document.getElementById('detail-content');
    container.innerHTML = `<div class="loading"><span class="spinner"></span>AI가 커뮤니티 언급량과 트렌드를 분석하는 중...</div>`;
    
    try {
      // 💡 [CORS 해결]: 클로드 주소로 직접 쏘지 않고, 내부 Vercel 백엔드(/api/analyze)로 전달합니다.
      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          symbol: pick.symbol,
          name: pick.name,
          desc: pick.desc
        })
      });

      if (!response.ok) throw new Error('서버 응답 오류');
      const resData = await response.json();
      
      // 백엔드에서 받아온 데이터 바인딩
      container.innerHTML = `
        <div class="card">
          <div class="stock-symbol">${pick.symbol}</div>
          <div class="stock-meta">${pick.name} · ${pick.exchange}</div>
          <div class="divider"></div>
          <div class="ai-verdict ${pick.verdict === 'buy' ? '' : 'hold-v'}">
            <div class="ai-verdict-icon"><i class="ti ti-brain"></i></div>
            <div>
              <div class="ai-verdict-title">AI 종합 의견: ${pick.action}</div>
              <div class="ai-verdict-sub">신뢰도 점수: ${pick.score}점</div>
            </div>
          </div>
          <div class="section-card">
            <h3><i class="ti ti-chart-bar"></i> AI 실시간 트렌드 분석 결과</h3>
            <div class="analysis-box">
              <p style="white-space: pre-wrap; color: #ccc;">${resData.data || '분석 결과를 불러올 수 없습니다.'}</p>
            </div>
          </div>
        </div>
      `;
    } catch (e) {
      console.error('분석 오류:', e);
      container.innerHTML = `<div class="loading" style="color:#E24B4A;">⚠️ AI 분석 데이터를 불러오지 못했습니다. 백엔드(api/analyze.js) 상태를 확인하세요.</div>`;
    }
  }

  function toggleKeyword(el, kw) {
    el.classList.toggle('sel');

  async function buildETF() {
    if(selectedKeywords.length === 0) {

    }
    const resultDiv = document.getElementById('etf-result');

    try {
      // 💡 [CORS 해결]: 백엔드 서버리스 함수로 호출 우회
      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'etf',
          keywords: selectedKeywords
        })

      resultDiv.innerHTML = `
